apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts/
    chart: victoria-metrics-k8s-stack
    # Pin to a specific chart version. Floating ("0.48.x") would let an
    # autosync silently roll values schema changes onto us. Bump deliberately.
    targetRevision: 0.81.0
    helm:
      releaseName: vm
      values: |
        # Global default: pin everything to the worker. The control node only
        # has 3GB RAM and runs the k3s control plane, so we keep workloads off
        # it. node-exporter is a DaemonSet and overrides this below so we still
        # get host metrics from control too.
        nodeSelector:
          kubernetes.io/hostname: k3s-worker1

        # vmsingle = the single-node VictoriaMetrics TSDB. The chart also
        # supports a cluster mode (vmstorage/vmselect/vminsert), which is
        # pointless overhead when there's only one worker.
        vmsingle:
          enabled: true
          spec:
            retentionPeriod: "30d"
            nodeSelector:
              kubernetes.io/hostname: k3s-worker1
            # local-path, not Longhorn. Monitoring data is regenerable — if
            # the worker dies we lose history but nothing important, and we
            # don't want to spend Longhorn replicas (or the 500GB vdb) on it.
            # See ADR 005.
            storage:
              accessModes: ["ReadWriteOnce"]
              storageClassName: local-path
              resources:
                requests:
                  storage: 10Gi
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                # Hard ceiling — a runaway scrape shouldn't be able to OOM the node.
                memory: 512Mi

        vmcluster:
          enabled: false

        # vmalert evaluates the rules in homelab-rules.yaml plus the chart's
        # built-in Kubernetes rules. Sends firing alerts to alertmanager.
        vmalert:
          enabled: true
          spec:
            nodeSelector:
              kubernetes.io/hostname: k3s-worker1
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 128Mi

        # Alertmanager: dedupes and routes alerts to email. SMTP password is
        # pulled from the `alertmanager-smtp` SealedSecret at runtime.
        alertmanager:
          enabled: true
          spec:
            nodeSelector:
              kubernetes.io/hostname: k3s-worker1
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
          config:
            global:
              resolve_timeout: 5m
              # smtp_auth_password is injected from the sealed secret; see
              # extraSecretMounts wiring in ADR 005.
              smtp_smarthost: "smtp.protonmail.ch:587"
              smtp_from: "homelab-monitor@dowd.ie"
              smtp_auth_username: "homelab-monitor@dowd.ie"
              smtp_require_tls: true
            route:
              receiver: "email"
              group_by: ["alertname", "namespace"]
              group_wait: 30s
              group_interval: 5m
              # 4h on warnings — long enough that I'm not getting spammed,
              # short enough that I'll see something still firing the next morning.
              repeat_interval: 4h
              routes:
                # Criticals nag every hour until acknowledged or resolved.
                - receiver: "email"
                  matchers:
                    - severity = "critical"
                  repeat_interval: 1h
            receivers:
              - name: "email"
                email_configs:
                  - to: "henry@dowd.ie"
                    send_resolved: true
            # If a critical is firing for the same alertname+namespace, don't
            # also send the warning version of it. Cuts noise during incidents.
            inhibit_rules:
              - source_matchers: [severity = "critical"]
                target_matchers: [severity = "warning"]
                equal: ["alertname", "namespace"]

        # node-exporter scrapes host-level metrics (CPU, RAM, disk, network).
        # DaemonSet — runs on every node, including control. Clearing the
        # global nodeSelector + adding a blanket toleration is what lets it
        # override the worker-only pin.
        prometheus-node-exporter:
          enabled: true
          resources:
            requests:
              cpu: 10m
              memory: 24Mi
            limits:
              memory: 48Mi
          nodeSelector: {}
          tolerations:
            - effect: NoSchedule
              operator: Exists

        # kube-state-metrics turns k8s objects (pods, deployments, jobs) into
        # metrics so we can alert on things like "deployment has 0 ready replicas".
        kube-state-metrics:
          enabled: true
          nodeSelector:
            kubernetes.io/hostname: k3s-worker1
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi

        grafana:
          enabled: true
          nodeSelector:
            kubernetes.io/hostname: k3s-worker1
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              memory: 256Mi
          # 2GB local-path PVC for Grafana's SQLite (users, prefs, starred boards).
          # Dashboards themselves live as ConfigMaps in git, so losing this isn't
          # the end of the world — just an admin password reset.
          persistence:
            enabled: true
            storageClassName: local-path
            size: 2Gi
          # The sidecar watches for ConfigMaps with `grafana_dashboard: "1"`
          # and auto-loads them. That's how grafana-dashboard-capacity.yaml
          # gets picked up — no UI imports needed.
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              labelValue: "1"
              searchNamespace: ALL
            datasources:
              enabled: true
          ingress:
            enabled: true
            ingressClassName: traefik
            # Don't pin router.entrypoints — see the comment in
            # nextcloud/ingress.yaml for the full story. tl;dr: cloudflared
            # speaks plain HTTP, websecure-only routers 404.
            annotations: {}
            hosts:
              - grafana.henrydowd.dev
              - grafana.lan
            path: /
            pathType: Prefix
          grafana.ini:
            server:
              root_url: "https://grafana.henrydowd.dev"
            security:
              disable_initial_admin_creation: false

        # Keep the chart's bundled k8s alerts and recording rules.
        defaultRules:
          create: true
          rules:
            # k3s embeds etcd in the apiserver process — the standalone etcd
            # rules don't apply and just generate noise.
            etcd: false
            # k3s doesn't expose the scheduler as a separate component either.
            kubeScheduler: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
