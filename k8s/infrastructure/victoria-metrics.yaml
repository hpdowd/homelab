apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics
  namespace: argocd
  # No resources-finalizer (same as every other app here): deleting the
  # Application must never cascade-delete live resources. The monitoring
  # namespace has needed force-finalizer surgery before (see HOMELAB gotcha
  # / vm-operator pattern) — orphaning on delete is the safer default.
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts/
    chart: victoria-metrics-k8s-stack
    # Pin to a specific chart version. Floating ("0.48.x") would let an
    # autosync silently roll values schema changes onto us. Bump deliberately.
    targetRevision: 0.81.0
    helm:
      releaseName: vm
      values: |
        # Global default: pin everything to the worker. The control node only
        # has 4GiB RAM and runs the k3s control plane, so we keep workloads off
        # it. node-exporter is a DaemonSet and overrides this below so we still
        # get host metrics from control too.
        nodeSelector:
          kubernetes.io/hostname: k3s-worker1

        # vmsingle = the single-node VictoriaMetrics TSDB. The chart also
        # supports a cluster mode (vmstorage/vmselect/vminsert), which is
        # pointless overhead when there's only one worker.
        vmsingle:
          enabled: true
          spec:
            retentionPeriod: "30d"
            nodeSelector:
              kubernetes.io/hostname: k3s-worker1
            # local-path, not Longhorn. Monitoring data is regenerable — if
            # the worker dies we lose history but nothing important, and we
            # don't want to spend Longhorn replicas (or the 500GB vdb) on it.
            # See ADR 005.
            storage:
              accessModes: ["ReadWriteOnce"]
              storageClassName: local-path
              resources:
                requests:
                  storage: 10Gi
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                # Hard ceiling — a runaway scrape shouldn't be able to OOM the node.
                memory: 2Gi
            extraArgs:
              # Cap VM's in-memory caches at 40% of the memory limit above,
              # leaving headroom under the 2Gi ceiling for query/ingest spikes.
              memory.allowedPercent: "40"

        vmcluster:
          enabled: false

        # vmalert evaluates the rules in homelab-rules.yaml plus the chart's
        # built-in Kubernetes rules. Sends firing alerts to alertmanager.
        vmalert:
          enabled: true
          spec:
            nodeSelector:
              kubernetes.io/hostname: k3s-worker1
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 128Mi

        # Alertmanager: dedupes and routes alerts to email. SMTP password is
        # pulled from the `alertmanager-smtp` SealedSecret at runtime.
        alertmanager:
          enabled: true
          spec:
            nodeSelector:
              kubernetes.io/hostname: k3s-worker1
            secrets:
              - alertmanager-smtp
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
          config:
            global:
              resolve_timeout: 5m
              smtp_smarthost: "smtp-relay.brevo.com:587"
              smtp_from: "homelab-monitor@henrydowd.dev"
              smtp_auth_username: "ae07ea001@smtp-brevo.com"
              smtp_auth_password_file: /etc/vm/secrets/alertmanager-smtp/smtp_password
              smtp_require_tls: true
            route:
              receiver: "email"
              group_by: ["alertname", "namespace"]
              group_wait: 30s
              group_interval: 5m
              # 6h on warnings — long enough that I'm not getting spammed,
              # short enough that I'll see something still firing the next morning.
              repeat_interval: 6h
              routes:
                # KubeCPU/MemoryOvercommit fire permanently on a 2-node
                # cluster ("cannot tolerate node failure" — true by design
                # here). Null-routed rather than disabled so they stay
                # visible in vmalert/Grafana without emailing every 6h.
                - receiver: "null"
                  matchers:
                    - alertname =~ "Watchdog|InfoInhibitor|KubeCPUOvercommit|KubeMemoryOvercommit"

                # Criticals nag every hour until acknowledged or resolved.
                - receiver: "email"
                  matchers:
                    - severity = "critical"
                  repeat_interval: 1h
            receivers:
              - name: "null"
              - name: "email"
                email_configs:
                  - to: "henry@dowd.ie"
                    send_resolved: true
            # If a critical is firing for the same alertname+namespace, don't
            # also send the warning version of it. Cuts noise during incidents.
            inhibit_rules:
              - source_matchers: [severity = "critical"]
                target_matchers: [severity = "warning"]
                equal: ["alertname", "namespace"]
                # InfoInhibitor suppresses lone info alerts; they only
                # surface alongside a warning/critical in the same namespace.
              - source_matchers: [alertname = "InfoInhibitor"]
                target_matchers: [severity = "info"]
                equal: ["namespace"]

        # k3s bundles the controller-manager, scheduler, kube-proxy, and datastore
        # into the single k3s server process — none are exposed as the separately
        # scrapeable endpoints a kubeadm cluster has. Left enabled, these scrape
        # jobs are permanently-down targets that trip TargetDown plus the
        # per-component *Down alerts. Turn the ServiceMonitors off here; the
        # matching alert rules are disabled under defaultRules below.
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeEtcd:                # k3s defaults to embedded SQLite, not etcd
          enabled: false
        kubeProxy:
          enabled: false

        # node-exporter scrapes host-level metrics (CPU, RAM, disk, network).
        # DaemonSet — runs on every node, including control. Clearing the
        # global nodeSelector + adding a blanket toleration is what lets it
        # override the worker-only pin.
        prometheus-node-exporter:
          enabled: true
          resources:
            requests:
              cpu: 10m
              memory: 24Mi
            limits:
              memory: 48Mi
          nodeSelector: {}
          tolerations:
            - effect: NoSchedule
              operator: Exists

        # kube-state-metrics turns k8s objects (pods, deployments, jobs) into
        # metrics so we can alert on things like "deployment has 0 ready replicas".
        kube-state-metrics:
          enabled: true
          nodeSelector:
            kubernetes.io/hostname: k3s-worker1
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi

        grafana:
          enabled: true
          nodeSelector:
            kubernetes.io/hostname: k3s-worker1
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          admin:
            existingSecret: grafana-admin-creds
            userKey: admin-user
            passwordKey: admin-password
          # persistence off → Grafana runs on an emptyDir, not a PVC. Its SQLite
          # (users, prefs, starred boards) is ephemeral and resets when the pod is
          # rescheduled — which is the point: a reused local-path PVC once carried
          # a corrupted SQLite DB across namespace deletions and crash-looped every
          # reinstall (docs/lessons/k8s/grafana-pvc-corruption.md). Nothing
          # important lives here — dashboards are ConfigMaps in git (sidecar below)
          # and the admin login is recreated from the grafana-admin-creds
          # SealedSecret on every start. storageClassName/size are inert while
          # disabled; kept for if we ever flip it on.
          persistence:
            enabled: false
            storageClassName: local-path
            size: 2Gi
          # The sidecar watches for ConfigMaps with `grafana_dashboard: "1"`
          # and auto-loads them. That's how grafana-dashboard-capacity.yaml
          # gets picked up — no UI imports needed.
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              labelValue: "1"
              searchNamespace: ALL
            # Datasource sidecar off — the VictoriaMetrics datasource is declared
            # inline below instead of discovered from a ConfigMap.
            datasources:
              enabled: false
          ingress:
            enabled: true
            ingressClassName: traefik
            # Don't pin router.entrypoints — see the comment in
            # nextcloud/ingress.yaml for the full story. tl;dr: cloudflared
            # speaks plain HTTP, websecure-only routers 404.
            annotations: {}
            hosts:
              - grafana.henrydowd.dev
              - grafana.lan
            path: /
            pathType: Prefix
          grafana.ini:
            server:
              root_url: "https://grafana.henrydowd.dev"
            security:
              disable_initial_admin_creation: false
          plugins: []
          extraEnvVars:
            GF_INSTALL_PLUGINS: ""
            GF_PLUGINS_PREINSTALL: ""
            GF_PLUGINS_PREINSTALL_SYNC: ""
          datasources:
            datasources.yaml:
              apiVersion: 1
              datasources:
                - name: VictoriaMetrics
                  type: prometheus
                  access: proxy
                  url: http://vmsingle-vm-victoria-metrics-k8s-stack.monitoring.svc:8428
                  isDefault: true

        # Keep the chart's bundled k8s alert + recording rules, but drop the
        # groups that target control-plane components k3s doesn't expose (their
        # scrape jobs are disabled above). Otherwise we get permanent
        # KubeControllerManagerDown / KubeSchedulerDown alerts and scheduler
        # recording rules stuck on "no data".
        defaultRules:
          enabled: true          # chart default; explicit for intent
          groups:
            kubernetesSystemControllerManager:   # KubeControllerManagerDown
              enabled: false
            kubernetesSystemScheduler:           # KubeSchedulerDown
              enabled: false
            kubeScheduler:                       # scheduler recording rules (no data on k3s)
              enabled: false
            etcd:                                # etcd rules — k3s uses embedded SQLite
              enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
