apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://metallb.github.io/metallb
    chart: metallb
    # Pin to a specific chart version (same reasoning as victoria-metrics.yaml):
    # floating "0.14.x" lets an autosync roll new versions in unattended.
    targetRevision: 0.14.9
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # MetalLB's CRDs are too large for the client-side-apply
      # last-applied-configuration annotation, which left the bgppeers CRD
      # permanently OutOfSync. Server-side apply diffs against the live
      # object instead.
      - ServerSideApply=true
