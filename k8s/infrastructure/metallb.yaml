apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://metallb.github.io/metallb
    chart: metallb
    # Pin to a specific chart version (same reasoning as victoria-metrics.yaml):
    # floating "0.14.x" lets an autosync roll new versions in unattended.
    targetRevision: 0.14.9
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  # MetalLB's controller injects a rotating caBundle into the CRD conversion
  # webhook at runtime; the chart ships it empty, so the bgppeers CRD showed
  # a permanent OutOfSync diff. Ignore that one field.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion/webhook/clientConfig/caBundle
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Server-side apply: MetalLB's CRDs are too large for the client-side
      # last-applied-configuration annotation.
      - ServerSideApply=true
      # Don't overwrite the ignored caBundle field when syncing.
      - RespectIgnoreDifferences=true
