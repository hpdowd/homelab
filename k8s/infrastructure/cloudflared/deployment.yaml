# The public-ingress path: this pod dials OUT to Cloudflare and keeps the
# tunnel open, so no ports are forwarded on the router and the home IP stays
# unpublished. Cloudflare terminates TLS at the edge and the tunnel delivers
# plain HTTP to Traefik's `web` entrypoint — which is why no Ingress here may
# pin `router.entrypoints: websecure` (see gotchas.md).
#
# The tunnel token comes from the cloudflared-token SealedSecret. Replacing
# the tunnel = new token = reseal.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          # Pinned: this is the public ingress path — a silently-pulled new
          # :latest on a pod restart is the wrong time to discover a breaking
          # change. Bump deliberately.
          image: cloudflare/cloudflared:2026.6.0
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: token
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
