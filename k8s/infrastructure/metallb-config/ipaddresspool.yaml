# LAN IPs MetalLB may hand to LoadBalancer Services, announced over ARP
# (L2). Outside the router's DHCP range. In practice only .200 is in use —
# Traefik pins it via annotation, and Technitium points *.lan and
# *.henrydowd.dev at it.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: default-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.1.200-192.168.1.210
