# Issuers + the wildcard cert + Traefik default TLSStore. Separate app from
# cert-manager itself (same pattern as metallb / metallb-config) so the CRDs
# exist before these sync; SkipDryRunOnMissingResource covers the first pass.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://git.henrydowd.dev/henry/homelab.git
    targetRevision: HEAD
    path: k8s/infrastructure/cert-manager-config
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
