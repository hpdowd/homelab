# Default TLS store: Traefik presents this cert on websecure for every router,
# no per-Ingress tls blocks needed. This is what fixes LAN HTTPS — Technitium
# sends *.henrydowd.dev straight to Traefik (192.168.1.200), bypassing
# Cloudflare's edge cert, so Traefik itself must hold a real one.
# Only one TLSStore named "default" may exist cluster-wide.
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: traefik
spec:
  defaultCertificate:
    secretName: henrydowd-dev-tls
