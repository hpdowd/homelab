# DNS-01 via Cloudflare — the only challenge type that works here: HTTP-01
# would need port 80 reachable from the internet, but public ingress is
# Cloudflare Tunnel only. DNS-01 also allows the wildcard.
# Token secret lives in the cert-manager namespace (cluster-resource-namespace
# default for ClusterIssuer refs). Scopes needed: Zone:Read + DNS:Edit.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: henry@dowd.ie
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
# Staging issuer kept for debugging challenge problems without burning
# Let's Encrypt prod rate limits (5 duplicate certs/week).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: henry@dowd.ie
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
