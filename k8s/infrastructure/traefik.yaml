apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.traefik.io/traefik
    chart: traefik
    # Pin to a specific chart version (same reasoning as victoria-metrics.yaml):
    # floating "34.x" lets an autosync roll new versions in unattended.
    targetRevision: 34.5.0
    helm:
      values: |
        deployment:
          replicas: 1

        service:
          type: LoadBalancer
          annotations:
            metallb.universe.tf/loadBalancerIPs: "192.168.1.200"

        providers:
          kubernetesCRD:
            enabled: true
          kubernetesIngress:
            enabled: true

        ingressClass:
          enabled: true
          isDefaultClass: true

        # Traefik v3 defaults readTimeout to 60s (v2: unlimited) — kills any
        # request whose body takes >60s to send, i.e. large Immich/Nextcloud
        # uploads on slow links. 0 = disabled. Cloudflare's 100MB tunnel cap
        # (ADR 006) is separate and unaffected.
        ports:
          web:
            transport:
              respondingTimeouts:
                readTimeout: 0
          websecure:
            transport:
              respondingTimeouts:
                readTimeout: 0

        logs:
          general:
            level: INFO
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
