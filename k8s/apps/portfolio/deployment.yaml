# The portfolio is a single static Go binary that embeds the built site and
# serves it + /api on :8080, with /metrics + /healthz on a separate :9090 that
# the Ingress never routes to. It holds NO secrets: VictoriaMetrics needs no
# auth, and the Gitea activity feed reads a public repo anonymously.
#
# No PVC, so RollingUpdate is correct (the Recreate rule only applies to
# Longhorn RWO volumes). Pinned to the worker like everything else — the control
# node is scheduling-disabled.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: portfolio
spec:
  replicas: 1
  strategy: { type: RollingUpdate }
  selector:
    matchLabels: { app: portfolio }
  template:
    metadata:
      labels: { app: portfolio }
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s-worker1
      # Static Go binary that embeds the site and holds no secrets — run it
      # fully locked down.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: portfolio
          # Built by GitHub Actions (henry/portfolio is push-mirrored to GitHub;
          # the in-cluster runner has no Docker daemon) and published to GHCR,
          # which the cluster pulls anonymously like Immich. CI pins this to the
          # immutable :<sha>; :latest covers the first sync before CI has run.
          image: ghcr.io/hpdowd/portfolio:58da0d770d1e
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - { name: http, containerPort: 8080 }
            - { name: metrics, containerPort: 9090 }
          env:
            # Cluster-internal, no auth. Names confirmed via `kubectl get svc`.
            - { name: VM_URL, value: "http://vmsingle-vm-victoria-metrics-k8s-stack.monitoring.svc:8428" }
            - { name: GITEA_URL, value: "http://gitea.gitea.svc:3000" }
            - { name: GITEA_REPO, value: "henry/homelab" }
          resources:
            requests: { cpu: "25m", memory: "48Mi" }
            limits: { memory: "128Mi" }
          # Probes target the private metrics port, not the public one.
          readinessProbe:
            httpGet: { path: /healthz, port: metrics }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: metrics }
            periodSeconds: 30
