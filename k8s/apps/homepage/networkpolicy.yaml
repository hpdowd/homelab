# Default-deny ingress + minimum allowlist (copied from kiwix, port swapped to
# 3000). Homepage only serves the dashboard on :3000; allow that from
# in-cluster (Traefik + probes) and nothing else inbound.
#
# Egress stays OPEN deliberately: when widgets land (step 4) homepage must
# reach service APIs cluster-wide, and a restrictive egress netpol here would
# trip the kube-router fresh-pod race that broke nextcloud-cron. Ingress-only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-ingress
  namespace: homepage
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}
    - from:
        - ipBlock: { cidr: 10.42.0.0/16 }
        - ipBlock: { cidr: 192.168.1.10/32 }
        - ipBlock: { cidr: 192.168.1.11/32 }
      ports:
        - { protocol: TCP, port: 3000 }
