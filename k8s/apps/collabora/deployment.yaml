apiVersion: apps/v1
kind: Deployment
metadata:
  name: collabora
  namespace: collabora
spec:
  replicas: 1
  selector:
    matchLabels: { app: collabora }
  template:
    metadata:
      labels: { app: collabora }
    spec:
      # Control node is RAM-starved; keep this on the worker
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - {
                      key: kubernetes.io/hostname,
                      operator: In,
                      values: ["k3s-worker1"],
                    }
      # --- INTERIM reachback fix: resolve nextcloud.henrydowd.dev via public DNS
      #     so the WOPI callback gets Cloudflare's valid cert. Delete this whole
      #     dnsPolicy/dnsConfig block once cert-manager issues a real Traefik cert.
      dnsPolicy: "None"
      dnsConfig:
        nameservers: ["1.1.1.1", "1.0.0.1"]
      # ---
      containers:
        - name: code
          image: collabora/code:26.04.1.4.1 # 25.04 downgrade was a ruled-out test during the slow-load incident
          ports:
            - containerPort: 9980
          env:
            - name: aliasgroup1
              value: "https://nextcloud\\.henrydowd\\.dev" # regex; dots escaped
            - name: server_name
              value: "collabora.henrydowd.dev" # required behind a Host-rewriting proxy
            - name: extra_params
              # ssl handled by Cloudflare/Traefik; prespawn is cheap with bind-mounted jails
              value: "--o:ssl.enable=false --o:ssl.termination=true --o:num_prespawn_children=2"
            - name: dictionaries
              value: "en_GB en_US"
            - name: username
              value: "admin"
            - name: password
              valueFrom:
                secretKeyRef: { name: collabora-admin, key: password }
          # Both settings below are load-bearing for fast (~6ms) bind-mounted kit
          # jails. Without them CODE silently falls back to copying the whole LO
          # tree per jail. The AppArmor *field* is required — the deprecated
          # annotation does not apply on k3s >=1.30, and the default
          # cri-containerd profile denies mount(2). The caps feed the file
          # capabilities on coolmount/coolforkit-caps (pid 1 CapEff=0 is normal).
          # See docs/lessons/k8s/collabora-slow-load-wordbook.md
          securityContext:
            appArmorProfile:
              type: Unconfined
            capabilities:
              add: ["SYS_ADMIN", "MKNOD", "SYS_CHROOT", "FOWNER", "CHOWN"]
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { memory: 2Gi }
          startupProbe:
            httpGet: { path: /hosting/discovery, port: 9980 }
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /hosting/discovery, port: 9980 }
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 9980 }
            periodSeconds: 20
