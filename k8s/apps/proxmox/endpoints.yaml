# Same selectorless-Service + EndpointSlice pattern as amp/, pointing at the
# Proxmox web UI on the host itself (192.168.1.2:8006). Needs the argocd-cm
# EndpointSlice patch to sync — rebuild runbook step 6.
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: proxmox-external
  namespace: proxmox
  labels:
    kubernetes.io/service-name: proxmox-external
addressType: IPv4
endpoints:
  - addresses:
      - 192.168.1.2
    conditions:
      ready: true
ports:
  - port: 8006
    protocol: TCP
