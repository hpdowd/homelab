# Inbound web UI only, on two hostnames. secure.henrydowd.dev is covered by the
# *.henrydowd.dev wildcard (cloudflared tunnel route + LE wildcard cert), no new
# route/DNS needed there. secure.dowd.ie is a separate Cloudflare zone — its own
# tunnel public hostname route + Zero Trust Access application already set up
# in the dashboard (not in this repo). Neither host is on the LAN/Technitium;
# both are tunnel/internet-only. Conventions match the other apps:
# ingressClassName traefik; no router.entrypoints annotation (cloudflared
# speaks plain HTTP); no per-Ingress tls block (the default TLSStore serves the
# LE wildcard, irrelevant here since neither host resolves on the LAN).
#
# IMPORTANT: this app handles sensitive data. Unlike the public apps it MUST sit
# behind a Cloudflare Access policy on both hostnames (Zero Trust > Access >
# Applications), restricted to the specific people allowed to use it. The Ingress
# does no authentication.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: file-parser
  namespace: file-parser
spec:
  ingressClassName: traefik
  rules:
    - host: secure.henrydowd.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: file-parser
                port: { number: 80 }
    - host: secure.dowd.ie
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: file-parser
                port: { number: 80 }
