# Default-deny ingress + minimum allowlist (copy of kiwix). Paperless serves
# on :8000; Postgres/Valkey are same-namespace so the first (podSelector {})
# rule already lets the app reach them — no separate allow needed.
#
# Ingress-only ON PURPOSE: do NOT add a restrictive egress netpol here. The
# consumer/Celery workers hit Postgres at t~=0 and would trip the kube-router
# fresh-pod registration race that broke nextcloud-cron (ADR 011 carve-out).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-ingress
  namespace: paperless
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}
    - from:
        - ipBlock: { cidr: 10.42.0.0/16 }
        - ipBlock: { cidr: 192.168.1.10/32 }
        - ipBlock: { cidr: 192.168.1.11/32 }
      ports:
        - { protocol: TCP, port: 8000 }
