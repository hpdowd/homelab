# Daily Paperless backup to Backblaze B2 via restic. 04:30 local — fourth slot
# in the nightly window (nextcloud 03:00, gitea 03:30, immich 04:00), same
# flaky-upload-link reasoning as the others.
#
# Same shape as the Immich job: runs alongside the live pod (podAffinity +
# read-only mount of the RWO media PVC — RWO allows a second same-node reader),
# pg_dump to an emptyDir, retry loop for the data upload. Own restic repo:
# .../paperless. No scale-to-0 (unlike Gitea): media is immutable once ingested
# and pg_dump is hot-safe, so nothing needs the app stopped.
#
# document_exporter (the version-portable insurance for major Paperless
# upgrades) is NOT run here — the media PVC is RWO so a second writer can't
# mount it live. Run it periodically by hand instead; see restore-procedure.md.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: paperless-backup
  namespace: paperless
  labels:
    app: paperless-backup
spec:
  schedule: "30 4 * * *"
  timeZone: "Europe/Dublin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      # 4h ceiling for the first full seed; incrementals take minutes.
      activeDeadlineSeconds: 14400
      template:
        spec:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: paperless
                  topologyKey: kubernetes.io/hostname
          restartPolicy: OnFailure
          volumes:
            - name: media
              persistentVolumeClaim:
                claimName: paperless-media
                readOnly: true
            - name: db-dump
              emptyDir: {}
          containers:
            - name: backup
              # postgres:18-alpine matches the PG18 in the paperless database
              # image — pg_dump client and server majors line up.
              image: postgres:18-alpine
              command:
                - /bin/sh
                - -c
                - |
                  # No `-e` on purpose — retries are handled by hand below.
                  set -uo pipefail

                  echo "[backup] Installing restic..."
                  apk add --no-cache --quiet restic

                  echo "[backup] Dumping Paperless database..."
                  if ! PGPASSWORD="${PAPERLESS_DBPASS}" pg_dump \
                        -h postgres.paperless.svc.cluster.local \
                        -U paperless \
                        -d paperless \
                        --format=custom \
                        --file=/dump/paperless_db.dump; then
                    echo "[backup] FATAL: database dump failed"
                    exit 1
                  fi
                  echo "[backup] DB dump size: $(du -sh /dump/paperless_db.dump | cut -f1)"

                  echo "[backup] Init restic repo if needed..."
                  restic snapshots --quiet 2>/dev/null || restic init

                  MAX=8
                  N=1
                  while [ "$N" -le "$MAX" ]; do
                    echo "[backup] Media backup attempt ${N}/${MAX}..."
                    if restic backup /media \
                          --tag paperless-media \
                          -o s3.connections=2; then
                      echo "[backup] Media backup complete"
                      break
                    fi
                    echo "[backup] Attempt ${N} dropped — sleeping then retrying"
                    N=$((N + 1))
                    sleep 20
                  done
                  if [ "$N" -gt "$MAX" ]; then
                    echo "[backup] FATAL: media backup failed after ${MAX} attempts"
                    exit 1
                  fi

                  echo "[backup] Backing up database dump..."
                  N=1
                  while [ "$N" -le 5 ]; do
                    if restic backup /dump --tag paperless-db -o s3.connections=2; then
                      break
                    fi
                    N=$((N + 1)); sleep 10
                  done

                  echo "[backup] Pruning old snapshots..."
                  restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 3 \
                    --prune --tag paperless-media || true
                  restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 3 \
                    --prune --tag paperless-db || true

                  echo "[backup] Done. Current snapshots:"
                  restic snapshots
              env:
                - name: RESTIC_REPOSITORY
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: RESTIC_REPOSITORY
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: RESTIC_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: PAPERLESS_DBPASS
                  valueFrom:
                    secretKeyRef:
                      name: paperless-secrets
                      key: PAPERLESS_DBPASS
              volumeMounts:
                - name: media
                  mountPath: /media
                  readOnly: true
                - name: db-dump
                  mountPath: /dump
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
