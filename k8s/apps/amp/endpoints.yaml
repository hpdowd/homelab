# AMP runs on LXC 102, not in the cluster. This hand-written EndpointSlice
# plus the selectorless Service in service.yaml is how Traefik routes to it
# anyway — Traefik just sees an endpoint, it doesn't care that it's an LXC.
# Pattern walkthrough: docs/reference/architecture.md.
#
# Gotcha: ArgoCD excludes EndpointSlices by default. Without the argocd-cm
# patch (rebuild runbook step 6) this never syncs and Traefik returns
# "no available server".
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: amp-external
  namespace: amp
  labels:
    kubernetes.io/service-name: amp-external
addressType: IPv4
endpoints:
  - addresses:
      - 192.168.1.15
    conditions:
      ready: true
ports:
  - port: 8080
    protocol: TCP
