# Second-level app-of-apps: root-app creates this, and this creates the
# Applications in k8s/infrastructure/ (MetalLB, Traefik, cloudflared,
# VictoriaMetrics). Keeps platform pieces in their own directory instead of
# mixing them in with the services.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://git.henrydowd.dev/henry/homelab.git
    targetRevision: HEAD
    path: k8s/infrastructure
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
