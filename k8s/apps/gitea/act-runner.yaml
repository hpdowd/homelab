apiVersion: apps/v1
kind: Deployment
metadata:
  name: act-runner
  namespace: gitea
spec:
  replicas: 1
  # Recreate, not RollingUpdate: both PVCs are Longhorn RWO, so only one pod
  # can mount them at a time (same constraint as the gitea deployment).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: act-runner
  template:
    metadata:
      labels:
        app: act-runner
    spec:
      # Pinned to the worker like the rest of the stack — the control node
      # (192.168.1.10, 4GiB) runs no app workloads.
      nodeSelector:
        kubernetes.io/hostname: k3s-worker1
      containers:
        # Docker-in-Docker: hosts the per-job containers act_runner spawns.
        # This is the one privileged container in the stack; it's confined to
        # the worker and runs only Henry's own workflows. Nested job
        # containers count against THIS container's memory cgroup, so the
        # limit here is effectively the per-job ceiling — sized for light
        # manifest CI, not heavy builds (those go to GitHub-hosted runners).
        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "1Gi" }
          volumeMounts:
            - name: certs
              mountPath: /certs
            - name: dind-storage
              mountPath: /var/lib/docker
            - name: config
              mountPath: /etc/docker/daemon.json
              subPath: daemon.json
        # The act_runner agent: registers with Gitea, polls for jobs, and
        # drives the dind daemon over TLS on localhost. Lightweight itself.
        - name: runner
          image: gitea/act_runner:0.2.11
          # dind needs a few seconds to write the client cert; retry until the
          # daemon answers before launching the runner, otherwise the first
          # job after a pod start can fail to reach docker.
          command:
            - sh
            - -c
            - |
              until [ -f /certs/client/cert.pem ]; do
                echo "waiting for dind TLS certs..."; sleep 2
              done
              exec /sbin/tini -- /opt/act/run.sh
          env:
            # Cluster-internal — avoids the public tunnel for registration and
            # job polling.
            - name: GITEA_INSTANCE_URL
              value: http://gitea.gitea.svc.cluster.local:3000
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-act-runner
                  key: registration-token
            - name: GITEA_RUNNER_NAME
              value: k3s-worker1
            - name: CONFIG_FILE
              value: /config/config.yaml
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_CERT_PATH
              value: /certs/client
            - name: DOCKER_TLS_VERIFY
              value: "1"
            # act_runner is a Go binary; without a soft limit Go's GC grows
            # the heap toward the cgroup cap and gets OOMKilled mid-job (seen
            # at both 192Mi and 384Mi). GOMEMLIMIT makes the runtime GC before
            # the hard limit. Idle RSS is ~10Mi; the headroom is for job runs.
            - name: GOMEMLIMIT
              value: "700MiB"
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits: { memory: "768Mi" }
          volumeMounts:
            - name: certs
              mountPath: /certs
            - name: runner-data
              mountPath: /data
            - name: config
              mountPath: /config
      volumes:
        # Shared TLS material: dind writes server+client certs here, the
        # runner reads /certs/client to talk to the daemon.
        - name: certs
          emptyDir: {}
        - name: config
          configMap:
            name: act-runner-config
        - name: dind-storage
          persistentVolumeClaim:
            claimName: act-runner-dind
        - name: runner-data
          persistentVolumeClaim:
            claimName: act-runner-data
