apiVersion: apps/v1
kind: Deployment
metadata:
  name: act-runner
  namespace: gitea
spec:
  replicas: 1
  # Recreate, not RollingUpdate: runner-data is a Longhorn RWO PVC, so only one
  # pod can mount it at a time (same constraint as the gitea deployment).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: act-runner
  template:
    metadata:
      labels:
        app: act-runner
    spec:
      # Pinned to the worker like the rest of the stack — the control node
      # (192.168.1.10, 4GiB) runs no app workloads.
      nodeSelector:
        kubernetes.io/hostname: k3s-worker1
      containers:
        # act_runner in HOST executor mode: registers with Gitea, polls for
        # jobs, and runs each job's steps directly in THIS container. There is
        # no Docker daemon and no privileged sidecar — this was the cluster's
        # only privileged workload, now an ordinary unprivileged pod. Jobs are
        # manifest-lint CI only (git + wget + kubeconform); heavy builds still
        # go to GitHub-hosted runners.
        - name: runner
          image: gitea/act_runner:0.2.11
          command:
            - sh
            - -c
            - |
              # One-time migration to the host executor: the persisted
              # registration in /data/.runner pins the OLD docker:// label
              # mapping, so the daemon would keep trying to reach a Docker
              # daemon that no longer exists. Drop it and let run.sh
              # re-register with the host labels from config.yaml (the
              # registration token is reusable). Idempotent: a host-mode
              # .runner has no docker:// to match. Once a host-mode run is
              # confirmed this whole command can be simplified to:
              #   command: ["/sbin/tini", "--", "/opt/act/run.sh"]
              if grep -q 'docker://' /data/.runner 2>/dev/null; then
                echo "migrating runner registration to host executor"
                rm -f /data/.runner
              fi
              exec /sbin/tini -- /opt/act/run.sh
          env:
            # Cluster-internal — avoids the public tunnel for registration and
            # job polling.
            - name: GITEA_INSTANCE_URL
              value: http://gitea.gitea.svc.cluster.local:3000
            - name: GITEA_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-act-runner
                  key: registration-token
            - name: GITEA_RUNNER_NAME
              value: k3s-worker1
            - name: CONFIG_FILE
              value: /config/config.yaml
            # act_runner is a Go binary; without a soft limit Go's GC grows the
            # heap toward the cgroup cap and gets OOMKilled mid-job. GOMEMLIMIT
            # makes the runtime GC before the hard limit. The job now runs in
            # this container's cgroup too, but manifest linting is light.
            - name: GOMEMLIMIT
              value: "700MiB"
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits: { memory: "768Mi" }
          volumeMounts:
            - name: runner-data
              mountPath: /data
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: act-runner-config
        - name: runner-data
          persistentVolumeClaim:
            claimName: act-runner-data
