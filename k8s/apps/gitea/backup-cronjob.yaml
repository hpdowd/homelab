# Daily Gitea backup to Backblaze B2 via restic. 03:30 local — staggered
# 30 minutes after the Nextcloud backup so they don't fight for the upload link.
#
# Unlike Nextcloud, Gitea goes offline for a few minutes here. Gitea uses
# SQLite, and the database file lives inside the data PVC. A live copy of an
# in-flight SQLite file is a recipe for a corrupt backup. So instead of getting
# clever with snapshots, we just scale the Gitea Deployment to 0 first, mount
# the freed-up volume, back it up, then scale back to 1.
#
# Talking to the k8s API: this pod runs as backup-sa (see backup-rbac.yaml).
# k8s mounts the SA's JWT at /var/run/secrets/.../token, so we can curl the
# API directly with no kubectl binary in the image.
#
# Safety: a `trap ERR` ensures Gitea gets scaled back to 1 even if restic dies
# mid-run. Without it, a failing backup would leave Gitea offline overnight.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gitea-backup
  namespace: gitea
  labels:
    app: gitea-backup
spec:
  schedule: "30 3 * * *"
  timeZone: "Europe/Dublin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # Low — we'd rather one clean failure than repeated retries that each
      # leave Gitea down for 30s during their scale-down phase.
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: backup-sa
          restartPolicy: OnFailure
          volumes:
            - name: gitea-data
              persistentVolumeClaim:
                claimName: gitea-data
                readOnly: true
          containers:
            - name: backup
              image: alpine:3.20
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  APISERVER="https://kubernetes.default.svc"
                  TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  NS="gitea"
                  DEPLOY="gitea"

                  # PATCH /apis/apps/v1/.../deployments/gitea with replicas=$1.
                  # Equivalent to: kubectl scale deployment gitea --replicas=$1
                  scale() {
                    curl -sf -X PATCH \
                      -H "Authorization: Bearer ${TOKEN}" \
                      -H "Content-Type: application/merge-patch+json" \
                      --cacert "${CACERT}" \
                      "${APISERVER}/apis/apps/v1/namespaces/${NS}/deployments/${DEPLOY}" \
                      -d "{\"spec\":{\"replicas\":${1}}}" > /dev/null
                  }

                  echo "[backup] Installing restic + curl..."
                  apk add --no-cache --quiet restic curl

                  echo "[backup] Scaling Gitea down..."
                  scale 0
                  # 30s is enough for a single-pod deployment to terminate
                  # and Longhorn to detach the volume.
                  sleep 30
                  echo "[backup] Gitea scaled down"

                  # CRITICAL: scale Gitea back up no matter how this ends.
                  trap 'echo "[backup] ERROR — scaling Gitea back up"; scale 1' ERR

                  echo "[backup] Init restic repo if needed..."
                  restic snapshots --quiet 2>/dev/null || restic init

                  echo "[backup] Backing up Gitea data..."
                  # Exclude logs — verbose, regenerated on restart, nothing
                  # we'd ever want from a restored backup.
                  restic backup /data \
                    --tag gitea-data \
                    --exclude="/data/gitea/log"

                  echo "[backup] Pruning old snapshots..."
                  restic forget \
                    --keep-daily 7 \
                    --keep-weekly 4 \
                    --keep-monthly 3 \
                    --prune \
                    --tag gitea-data

                  echo "[backup] Scaling Gitea back up..."
                  scale 1

                  echo "[backup] Done. Recent snapshots:"
                  restic snapshots --latest 1
              env:
                - name: RESTIC_REPOSITORY
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: RESTIC_REPOSITORY
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: RESTIC_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_SECRET_ACCESS_KEY
              volumeMounts:
                - name: gitea-data
                  mountPath: /data
                  readOnly: true
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
