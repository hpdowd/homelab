# k8s/apps/gitea/backup-cronjob.yaml
#
# Backs up Gitea data PVC to Backblaze B2 via restic.
# Runs daily at 03:30 Europe/Dublin — staggered 30min after Nextcloud backup.
#
# Scale-down pattern: Longhorn RWO volumes permit only a single pod attachment.
# The backup pod scales the Gitea Deployment to 0 via the Kubernetes API before
# mounting the PVC, then restores replicas=1 after the backup completes.
#
# The Kubernetes API is called directly using curl + the service account token
# mounted at /var/run/secrets/kubernetes.io/serviceaccount — no kubectl binary
# needed. Requires backup-sa ServiceAccount with patch rights (backup-rbac.yaml).
#
# Gitea is offline for the duration of the backup (~2–5 minutes typically).
# This is acceptable for a homelab — schedule at 03:30 when unused.
#
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gitea-backup
  namespace: gitea
  labels:
    app: gitea-backup
spec:
  schedule: "30 3 * * *"
  timeZone: "Europe/Dublin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1 # low — failed backup that skips scale-up is worse
      template:
        spec:
          serviceAccountName: backup-sa
          restartPolicy: OnFailure
          volumes:
            - name: gitea-data
              persistentVolumeClaim:
                claimName: gitea-data
                readOnly: true
          containers:
            - name: backup
              image: alpine:3.20
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  # k8s API helpers — uses the service account token mounted by k8s
                  APISERVER="https://kubernetes.default.svc"
                  TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
                  NS="gitea"
                  DEPLOY="gitea"

                  scale() {
                    curl -sf -X PATCH \
                      -H "Authorization: Bearer ${TOKEN}" \
                      -H "Content-Type: application/merge-patch+json" \
                      --cacert "${CACERT}" \
                      "${APISERVER}/apis/apps/v1/namespaces/${NS}/deployments/${DEPLOY}" \
                      -d "{\"spec\":{\"replicas\":${1}}}" > /dev/null
                  }

                  echo "[backup] Installing restic + curl..."
                  apk add --no-cache --quiet restic curl

                  echo "[backup] Scaling Gitea down..."
                  scale 0
                  # Wait for pod to release the volume — 30s is ample for a single pod
                  sleep 30
                  echo "[backup] Gitea scaled down"

                  # Ensure scale-up runs even if backup fails
                  trap 'echo "[backup] ERROR — scaling Gitea back up"; scale 1' ERR

                  echo "[backup] Initialising restic repo (no-op if exists)..."
                  restic snapshots --quiet 2>/dev/null || restic init

                  echo "[backup] Backing up Gitea data..."
                  restic backup /data \
                    --tag gitea-data \
                    --exclude="/data/gitea/log"

                  echo "[backup] Pruning old snapshots..."
                  restic forget \
                    --keep-daily 7 \
                    --keep-weekly 4 \
                    --keep-monthly 3 \
                    --prune \
                    --tag gitea-data

                  echo "[backup] Scaling Gitea back up..."
                  scale 1

                  echo "[backup] Done. Recent snapshots:"
                  restic snapshots --last 5
              env:
                - name: RESTIC_REPOSITORY
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: RESTIC_REPOSITORY
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: RESTIC_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_SECRET_ACCESS_KEY
              volumeMounts:
                - name: gitea-data
                  mountPath: /data
                  readOnly: true
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
