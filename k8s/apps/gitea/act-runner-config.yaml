apiVersion: v1
kind: ConfigMap
metadata:
  name: act-runner-config
  namespace: gitea
data:
  # act_runner reads this via the CONFIG_FILE env in the deployment.
  config.yaml: |
    log:
      level: info
    runner:
      # One job at a time — this runner only lint-validates manifests. Heavy
      # work (NextKeep Android) runs on GitHub-hosted runners instead.
      capacity: 1
      timeout: 1h
      fetch_timeout: 5s
      fetch_interval: 2s
      # HOST executor. `:host` runs the job's steps directly in the runner
      # container instead of spawning a per-job container through a Docker
      # daemon — which is what let us delete the privileged dind sidecar. The
      # job therefore only has the tools baked into the act_runner image
      # (git, wget+ssl_client, tar, sha256sum), so the workflow is written to
      # use those and no Node.js actions. The left side is the workflow's
      # `runs-on:` value.
      labels:
        - "ubuntu-latest:host"
        - "ubuntu-22.04:host"
    cache:
      enabled: true
      dir: "/data/cache"
