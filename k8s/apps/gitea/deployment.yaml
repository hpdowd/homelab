apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: gitea
spec:
  replicas: 1
  # Recreate, not RollingUpdate: gitea-data is a Longhorn RWO PVC, so only
  # one pod can mount it at a time — a rolling update would deadlock waiting
  # for the old pod to release the volume.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Regenerates app.ini from this heredoc on EVERY pod start — git is
        # the source of truth for Gitea config. Edit it here, not in the
        # running pod (hand edits are wiped on the next restart). Secrets are
        # injected via env at render time so they stay out of the repo.
        - name: config-init
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              mkdir -p /data/gitea/conf
              cat > /data/gitea/conf/app.ini << EOCONF
              RUN_USER = git
              RUN_MODE = prod
              APP_NAME = Henrys Gitea
              WORK_PATH = /data/gitea

              [repository]
              ROOT = /data/git
              SCRIPT_TYPE = sh

              [server]
              STATIC_ROOT_PATH = /usr/share/webapps/gitea
              APP_DATA_PATH = /data/gitea
              LFS_START_SERVER = true
              SSH_DOMAIN = git.henrydowd.dev
              DOMAIN = git.henrydowd.dev
              HTTP_PORT = 3000
              ROOT_URL = https://git.henrydowd.dev/
              DISABLE_SSH = false
              SSH_PORT = 2222
              START_SSH_SERVER = true
              LFS_JWT_SECRET = ${LFS_JWT_SECRET}
              OFFLINE_MODE = true

              [ui]
              SHOW_FOOTER_VERSION = false
              SHOW_FOOTER_BRANDING = false

              [database]
              DB_TYPE = sqlite3
              PATH = /data/gitea/db/gitea.db
              SSL_MODE = disable
              LOG_SQL = false

              [session]
              PROVIDER = file

              [log]
              ROOT_PATH = /data/gitea/log
              MODE = file
              LEVEL = info
              ENABLE_ACCESS_LOG = true
              ACCESS_LOG TEMPLATE = {{.Ctx.RemoteHost}} "{{.RequestID}}" {{.Request.Header.Get "X-Forwarded-For"}} "{{.Request.UserAgent}}" {{.Request.Method}} {{.Request.RequestURI}}

              [lfs]
              PATH = /data/gitea/lfs

              [mailer]
              ENABLED = false

              [service]
              REGISTER_EMAIL_CONFIRM = false
              ENABLE_NOTIFY_MAIL = false
              DISABLE_REGISTRATION = true
              ALLOW_ONLY_EXTERNAL_REGISTRATION = false
              ENABLE_CAPTCHA = false
              REQUIRE_SIGNIN_VIEW = false
              DEFAULT_KEEP_EMAIL_PRIVATE = false
              DEFAULT_ALLOW_CREATE_ORGANIZATION = true
              DEFAULT_ENABLE_TIMETRACKING = true
              NO_REPLY_ADDRESS = noreply.git.henrydowd.dev

              [openid]
              ENABLE_OPENID_SIGNIN = false
              ENABLE_OPENID_SIGNUP = false

              [cron.update_checker]
              ENABLED = false

              [cron.archive_cleanup]
              ENABLED = true
              RUN_AT_START = true
              SCHEDULE = @every 1h
              OLDER_THAN = 6h

              [repository.pull-request]
              DEFAULT_MERGE_STYLE = merge

              [repository.signing]
              DEFAULT_TRUST_MODEL = committer

              [security]
              INSTALL_LOCK = true
              INTERNAL_TOKEN = ${INTERNAL_TOKEN}
              PASSWORD_HASH_ALGO = pbkdf2

              [oauth2]
              JWT_SECRET = ${OAUTH2_JWT_SECRET}

              [webhook]
              ALLOWED_HOST_LIST = loopback, 127.0.0.1, 192.168.*, 10.*

              [actions]
              ENABLED = true
              # uses: actions/checkout@v4 (no host) resolves against github.com.
              # The act_runner reaches out to github for action tarballs; only
              # heavy CI (Android etc.) is offloaded to GitHub-hosted runners.
              DEFAULT_ACTIONS_URL = github
              EOCONF
          env:
            - name: LFS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: lfs-jwt-secret
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: internal-token
            - name: OAUTH2_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: oauth2-jwt-secret
          volumeMounts:
            - name: gitea-data
              mountPath: /data
      containers:
        - name: gitea
          image: gitea/gitea:1.24.6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              # s6 entrypoint runs as root, chowns /data, then drops to the git
              # user via su-exec (SETUID/SETGID). SSH is on 2222 (high port), so
              # no NET_BIND_SERVICE is needed.
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]
          ports:
            - containerPort: 3000
            - containerPort: 2222
          volumeMounts:
            - name: gitea-data
              mountPath: /data
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "1Gi" }
          # Gitea exposes an unauthenticated health endpoint at /api/healthz.
          # The startup probe covers slow first boots (migrations after an
          # image bump); liveness catches a hung process afterwards.
          startupProbe:
            httpGet: { path: /api/healthz, port: 3000 }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /api/healthz, port: 3000 }
            periodSeconds: 30
      volumes:
        - name: gitea-data
          persistentVolumeClaim:
            claimName: gitea-data
