apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      initContainers:
        - name: config-init
          image: alpine
          command:
            - sh
            - -c
            - |
              mkdir -p /data/gitea/conf
              cat > /data/gitea/conf/app.ini << EOCONF
              RUN_USER = git
              RUN_MODE = prod
              APP_NAME = Henrys Gitea
              WORK_PATH = /data/gitea

              [repository]
              ROOT = /data/git
              SCRIPT_TYPE = sh

              [server]
              STATIC_ROOT_PATH = /usr/share/webapps/gitea
              APP_DATA_PATH = /data/gitea
              LFS_START_SERVER = true
              SSH_DOMAIN = git.henrydowd.dev
              DOMAIN = git.henrydowd.dev
              HTTP_PORT = 3000
              ROOT_URL = https://git.henrydowd.dev/
              DISABLE_SSH = false
              SSH_PORT = 2222
              START_SSH_SERVER = true
              LFS_JWT_SECRET = ${LFS_JWT_SECRET}
              OFFLINE_MODE = true

              [ui]
              SHOW_FOOTER_VERSION = false
              SHOW_FOOTER_BRANDING = false

              [database]
              DB_TYPE = sqlite3
              PATH = /data/gitea/db/gitea.db
              SSL_MODE = disable
              LOG_SQL = false

              [session]
              PROVIDER = file

              [log]
              ROOT_PATH = /data/gitea/log
              MODE = file
              LEVEL = info

              [lfs]
              PATH = /data/gitea/lfs

              [mailer]
              ENABLED = false

              [service]
              REGISTER_EMAIL_CONFIRM = false
              ENABLE_NOTIFY_MAIL = false
              DISABLE_REGISTRATION = true
              ALLOW_ONLY_EXTERNAL_REGISTRATION = false
              ENABLE_CAPTCHA = false
              REQUIRE_SIGNIN_VIEW = false
              DEFAULT_KEEP_EMAIL_PRIVATE = false
              DEFAULT_ALLOW_CREATE_ORGANIZATION = true
              DEFAULT_ENABLE_TIMETRACKING = true
              NO_REPLY_ADDRESS = noreply.git.henrydowd.dev

              [openid]
              ENABLE_OPENID_SIGNIN = false
              ENABLE_OPENID_SIGNUP = false

              [cron.update_checker]
              ENABLED = false

              [repository.pull-request]
              DEFAULT_MERGE_STYLE = merge

              [repository.signing]
              DEFAULT_TRUST_MODEL = committer

              [security]
              INSTALL_LOCK = true
              INTERNAL_TOKEN = ${INTERNAL_TOKEN}
              PASSWORD_HASH_ALGO = pbkdf2

              [oauth2]
              JWT_SECRET = ${OAUTH2_JWT_SECRET}

              [webhook]
              ALLOWED_HOST_LIST = loopback, 127.0.0.1, 192.168.*, 10.*
              EOCONF
          env:
            - name: LFS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: lfs-jwt-secret
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: internal-token
            - name: OAUTH2_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gitea-secrets
                  key: oauth2-jwt-secret
          volumeMounts:
            - name: gitea-data
              mountPath: /data
      containers:
        - name: gitea
          image: gitea/gitea:latest
          ports:
            - containerPort: 3000
            - containerPort: 2222
          volumeMounts:
            - name: gitea-data
              mountPath: /data
      volumes:
        - name: gitea-data
          persistentVolumeClaim:
            claimName: gitea-data
