apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: gitea
spec:
  selector:
    app: gitea
  ports:
    - name: http
      port: 3000
      targetPort: 3000
    # Cluster-internal only. The tunnel is HTTP-only, so git-over-ssh isn't
    # reachable from outside — use HTTPS remotes (or the LAN/VPN).
    - name: ssh
      port: 2222
      targetPort: 2222
