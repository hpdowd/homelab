# Persists the runner's identity (.runner, written after registration) and the
# actions cache. Without this, every pod restart re-registers and leaves stale
# offline runners in the Gitea admin UI.
#
# The 15Gi act-runner-dind PVC that used to back the Docker daemon's
# /var/lib/docker is gone — the host executor spawns no containers, so there
# are no image layers to store.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: act-runner-data
  namespace: gitea
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
