# Permissions for the Gitea backup CronJob.
#
# The backup needs to scale the Gitea Deployment down to 0 (so the RWO volume
# detaches) and back up to 1 when done. Rather than ship kubectl in the image,
# the job uses the in-pod service-account token to talk to the k8s API directly
# with curl. That token is mounted automatically when a pod uses a SA, so this
# Role + RoleBinding is all the glue we need.
#
# Scope is narrow on purpose: only get + patch on this one Deployment in this
# one namespace. Nothing else.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-sa
  namespace: gitea
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-backup-role
  namespace: gitea
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-backup-rolebinding
  namespace: gitea
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitea-backup-role
subjects:
  - kind: ServiceAccount
    name: backup-sa
    namespace: gitea
