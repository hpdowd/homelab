apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kiwix
  namespace: kiwix
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  rules:
    - host: wiki.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kiwix-external
                port: { number: 8080 }
    - host: wiki.henrydowd.dev
      http:
        path:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kiwix
                port: { number: 8080 }
