apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiwix
  namespace: kiwix
spec:
  replicas: 1
  selector:
    matchLabels: { app: kiwix }
  template:
    metadata:
      labels: { app: kiwix }
    spec:
      containers:
        - name: kiwix
          image: ghcr.io/kiwix/kiwix-serve:3.7.0
          command: ["sh", "-c"]
          args: ["kiwix-serve --port=8080 /data/*.zim"]
          ports:
            - containerPort: 8080
              targetPort: 8080
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits: { memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kiwix-data
