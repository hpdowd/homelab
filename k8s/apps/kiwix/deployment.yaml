apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiwix
  namespace: kiwix
spec:
  replicas: 1
  selector:
    matchLabels: { app: kiwix }
  template:
    metadata:
      labels: { app: kiwix }
    spec:
      initContainers:
        # Fresh Longhorn volumes come up root-owned; kiwix-serve runs as a
        # non-root user and needs to read the ZIMs. Blunt but fine — the
        # volume only ever holds public wiki dumps.
        - name: fix-permissions
          image: busybox:1.37
          command: ["sh", "-c", "chmod 777 /data"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: kiwix
          image: ghcr.io/kiwix/kiwix-serve:3.7.0
          # Via sh -c so the *.zim glob expands at startup — ZIM dumps are
          # copied onto the PVC by hand (kubectl cp), and this picks up
          # whatever is there without listing filenames in the manifest.
          # New ZIM = restart the pod.
          command: ["sh", "-c"]
          args: ["kiwix-serve --port=8080 /data/*.zim"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits: { memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kiwix-data
