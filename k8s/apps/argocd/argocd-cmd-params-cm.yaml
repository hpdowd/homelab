# Runs argocd-server in plain-HTTP mode so it can sit behind the Traefik
# ingress (argocd.lan) instead of demanding TLS itself.
#
# Gotcha: changing this ConfigMap does NOT restart the server. After a
# rebuild, `kubectl rollout restart deployment argocd-server -n argocd`
# or argocd.lan serves nothing — rebuild runbook step 6.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
data:
  server.insecure: "true"
