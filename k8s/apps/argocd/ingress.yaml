# LAN-only on purpose: argocd.lan resolves via Technitium, and there is no
# public hostname for it in the tunnel. The UI that can change the whole
# cluster doesn't need to be on the internet.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
spec:
  ingressClassName: traefik
  rules:
    - host: argocd.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port: { number: 80 }
