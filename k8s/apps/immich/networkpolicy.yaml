# Default-deny ingress + minimum allowlist. East-west isolation: only Immich's
# own pods and the cluster ingress path can reach the server; Postgres/Redis are
# reachable only from inside this namespace. Egress stays open (version check,
# reverse-geocoding data, etc.).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-ingress
  namespace: immich
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    # 1. Same namespace: server <-> postgres <-> redis <-> ml, and the backup
    #    CronJob's pg_dump.
    - from:
        - podSelector: {}
    # 2. Cluster-internal callers to the two ports that face them: 2283 (server,
    #    via Traefik + probes) and 3003 (ml, kubelet probe on /ping). Node IPs
    #    included for probe safety. DB/Redis stay same-namespace only.
    - from:
        - ipBlock: { cidr: 10.42.0.0/16 }
        - ipBlock: { cidr: 192.168.1.10/32 }
        - ipBlock: { cidr: 192.168.1.11/32 }
      ports:
        - { protocol: TCP, port: 2283 }
        - { protocol: TCP, port: 3003 }
