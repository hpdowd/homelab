apiVersion: v1
kind: Namespace
metadata:
  name: immich
  # Prune=false — Layer-1 data-loss guard (ADR 014). ArgoCD now manages this
  # namespace, which holds irreplaceable Longhorn PVCs (reclaimPolicy Delete).
  # A vanished or mis-pathed manifest would otherwise cascade-prune
  # namespace -> PVC -> volume. This makes ArgoCD leave it; delete by hand.
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
