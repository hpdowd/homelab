# The RAM hog (see capacity-headroom.md) — CLIP + facial recognition models.
# Deliberately its own deployment so the server can restart without dropping
# the loaded models, and so its memory limit is the single knob that matters
# when watching the first library import.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-model-cache
  namespace: immich
spec:
  accessModes: [ReadWriteOnce]
  # local-path, not Longhorn: the cache is just downloaded models (~0.5–2GB),
  # fully regenerable. Same reasoning as the VictoriaMetrics TSDB, ADR 005.
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-ml
  namespace: immich
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich-ml
  template:
    metadata:
      labels:
        app: immich-ml
    spec:
      # Same service-link env problem as the server — see server.yaml.
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: k3s-worker1
      containers:
        - name: immich-ml
          image: ghcr.io/immich-app/immich-machine-learning:v2.7.5
          # No securityContext by design. The ADR 011 pass hardened every other
          # workload (drop-all-caps + RuntimeDefault seccomp), but this ONNX/
          # uvicorn worker hangs under it — ~0 CPU, /ping never answers even from
          # inside the pod, "application startup complete" never logs. immich-server
          # took the identical profile fine, so it's specific to the ML worker.
          # Left at default like Collabora; see ADR 011 carve-out 1. Internal-only
          # (faces immich-server, not the edge), so the exemption is low-risk.
          ports:
            - containerPort: 3003
          volumeMounts:
            - name: model-cache
              mountPath: /cache
          resources:
            requests: { memory: "1Gi", cpu: "250m" }
            # The import-spike ceiling. If the first big import OOMKills this,
            # raise it before lowering expectations — worker headroom maths in
            # capacity-headroom.md.
            limits: { memory: "3Gi" }
          # First start downloads models — give it time.
          startupProbe:
            httpGet: { path: /ping, port: 3003 }
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet: { path: /ping, port: 3003 }
            periodSeconds: 30
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: immich-model-cache
---
apiVersion: v1
kind: Service
metadata:
  name: immich-ml
  namespace: immich
spec:
  selector:
    app: immich-ml
  ports:
    - port: 3003
      targetPort: 3003
