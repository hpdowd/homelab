apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-db
  namespace: immich
  # Prune=false — never let ArgoCD auto-delete this data volume (ADR 014).
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: immich
spec:
  replicas: 1
  # RWO PVC — Recreate, same as every other DB here.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: immich-postgres
  template:
    metadata:
      labels:
        app: immich-postgres
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s-worker1
      # Postgres starts as root, chowns PGDATA, then drops to the postgres user
      # via gosu — so it keeps exactly the caps that flow needs and nothing
      # else. Running it fully non-root would mean relabelling the existing
      # data dir; not worth the risk on a live DB.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          # Immich's own postgres build — PG14 + the VectorChord extension it
          # needs for smart search. The version pairing matters: this is what
          # ships in the v2.7.5 docker-compose, don't bump it independently
          # of the server image. Digest-pinned because compose pins it too.
          image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: immich
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: immich-secrets, key: DB_PASSWORD }
            - name: POSTGRES_INITDB_ARGS
              value: "--data-checksums"
            # The vdb this lands on is the HDD mirror — tells the image to
            # tune VectorChord for spinning disks.
            - name: DB_STORAGE_TYPE
              value: "HDD"
            # Same lost+found dodge as the Nextcloud postgres.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: db
              mountPath: /var/lib/postgresql/data
            - name: shm
              mountPath: /dev/shm
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "2Gi" }
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: immich-db
        # compose sets shm_size 128mb; postgres parallel workers need more
        # than the 64MB k8s default.
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: immich
spec:
  selector:
    app: immich-postgres
  ports:
    - port: 5432
      targetPort: 5432
