# Ingress glue for the Technitium ADMIN UI only (LXC 100, :5380). The DNS
# server itself runs on the LXC and is deliberately outside the cluster —
# the cluster depends on it for *.lan, so it can't live inside the thing it
# serves. Same selectorless-Service + EndpointSlice pattern as amp/.
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: technitium
  namespace: technitium
  labels:
    kubernetes.io/service-name: technitium
addressType: IPv4
ports:
  - port: 5380
endpoints:
  - addresses: ["192.168.1.5"]
    conditions:
      ready: true
