# Alert rules specific to this homelab. Sit alongside the chart's bundled
# Kubernetes rules in vmalert; the rules here cover failure modes I've actually
# hit on this hardware (memory pressure, OOMs, the RWO Longhorn pain point,
# silently broken backups).
#
# The operator picks up VMRule CRDs (NOT PrometheusRule — one wrong kind
# fails the whole Application's sync batch, see the grafana-monitoring-sync
# cascade lesson) and feeds them to vmalert.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: homelab-rules
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: vm-k8s-stack
spec:
  groups:
    - name: homelab.memory
      rules:
        # Per-node thresholds — the two nodes have very different roles and
        # headroom, so a single global threshold doesn't fit either well.
        #
        # Control (4GiB, k3s control plane only): loose. It runs no app
        # workloads, so it normally sits with plenty free; only warn once it's
        # genuinely squeezed. 0.75GiB free for 5m.
        - alert: NodeMemoryLowControl
          expr: |
            node_memory_MemAvailable_bytes{instance="192.168.1.10:9100"} < 805306368
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Low available memory on control node ({{ $labels.instance }})"
            description: "Available memory < 0.75Gi for 5m on k3s-control. Something heavy got scheduled onto the control plane — investigate."

        # Worker1 (14GiB, runs every app): tight. This is the node that gates
        # adding workloads (e.g. Immich), so warn with a fat 2GiB cushion still
        # remaining — early enough to act before anything OOMs. 2GiB free for 5m.
        - alert: NodeMemoryLowWorker
          expr: |
            node_memory_MemAvailable_bytes{instance="192.168.1.11:9100"} < 2147483648
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Low available memory on worker node ({{ $labels.instance }})"
            description: "Available memory < 2Gi for 5m on k3s-worker1. Check before adding workloads (e.g. Immich)."

        # Watches the two k3s VMs (node-exporter doesn't see the Proxmox
        # host). >60% sustained means real memory pressure, not just normal
        # cache eviction. The `> 0` in the divisor doubles as a guard: nodes
        # with no swap drop out instead of dividing by zero.
        - alert: NodeSwapClimbing
          expr: |
            (node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes)
              / (node_memory_SwapTotal_bytes > 0) > 0.6
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Swap usage high on {{ $labels.instance }}"
            description: "Sustained swap > 60%. Real memory pressure — investigate the heaviest pods."

        # OOMKills are loud and worth waking up for. The `and on(...)` joins
        # the restart counter to the termination-reason metric so we only fire
        # when the restart was actually caused by OOM (not a normal redeploy).
        - alert: PodOOMKilled
          expr: |
            increase(kube_pod_container_status_restarts_total[15m]) > 0
            and on(namespace, pod)
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "OOMKilled: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "A container was OOMKilled. Its memory limit is too low or the node is starved."

    - name: homelab.workloads
      rules:
        # CrashLoopBackOff in disguise — k8s' actual state is fiddly to alert
        # on, but ">3 restarts in 15m" catches it reliably.
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "CrashLoopBackOff: {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "More than 3 restarts in 15m."

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas != kube_deployment_status_replicas_available
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} degraded"
            description: "Desired != available replicas for 10m."

    - name: homelab.storage
      rules:
        # 85% is high enough to ignore daily noise, low enough to act on. Both
        # the OS SSD and the Longhorn vdb get watched here.
        - alert: DiskFillingUp
          expr: |
            (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
              / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Disk > 85% on {{ $labels.instance }} ({{ $labels.mountpoint }})"
            description: "Filesystem usage high. The vdb (Longhorn) and the OS SSD both matter."

        # Longhorn's own metric. This Longhorn version (1.11) exposes
        # robustness as one 0/1 series per state (label `state`:
        # unknown/healthy/degraded/faulted), NOT the old single 0–3 gauge —
        # the first version of this rule compared `== 2` and could never
        # fire. Verified against live series this time.
        # Degraded means a replica is missing; faulted is data-loss
        # territory. Both deserve immediate attention.
        - alert: LonghornVolumeDegraded
          expr: |
            longhorn_volume_robustness{state=~"degraded|faulted"} == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn volume {{ $labels.pvc }} ({{ $labels.pvc_namespace }}) is {{ $labels.state }}"
            description: "RWO single-attach pain point. Check the volume and the worker node."

        # Guard for the alert above. This rule spent weeks dead because the
        # longhorn_* metrics were never scraped — the alert can't fire on data
        # that doesn't exist, which is its own silent failure. If the Longhorn
        # scrape (longhorn-scrape.yaml) breaks, this fires instead.
        - alert: LonghornMetricsAbsent
          expr: |
            absent(longhorn_volume_robustness)
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn metrics missing from VictoriaMetrics"
            description: "longhorn_volume_robustness has no series — the Longhorn scrape is broken, so LonghornVolumeDegraded is blind. Check the VMServiceScrape and vmagent targets."

    - name: homelab.backups
      rules:
        # A silently-broken backup is the worst failure mode here — you only
        # find out when you need it. Fire on the first failed run.
        - alert: BackupJobFailed
          expr: |
            kube_job_status_failed{namespace=~"nextcloud|gitea", job_name=~".*backup.*"} > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Backup job failed: {{ $labels.namespace }}/{{ $labels.job_name }}"
            description: "A restic backup CronJob failed. Check logs; verify B2 repo with restic check."

        # Catches the case where the CronJob isn't even running — e.g. the
        # whole job got deleted, schedule broken, or the cluster was down at
        # 03:00. 26h gives a bit of buffer past the 24h cadence.
        - alert: BackupJobMissing
          expr: |
            time() - max by (namespace) (
              kube_job_status_completion_time{namespace=~"nextcloud|gitea", job_name=~".*backup.*"}
            ) > 26 * 3600
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: "No recent backup in {{ $labels.namespace }}"
            description: "No successful backup job completed in > 26h. The daily CronJob may not be running."
