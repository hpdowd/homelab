apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-db
  namespace: nextcloud
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: nextcloud
spec:
  replicas: 1
  strategy:
    type: Recreate # block-storage RWO PVC — never run two pods against it
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18 # MUST be >= source major (18.4). Do not downgrade.
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                { secretKeyRef: { name: nextcloud-secrets, key: POSTGRES_DB } }
            - name: POSTGRES_USER
              valueFrom:
                {
                  secretKeyRef: { name: nextcloud-secrets, key: POSTGRES_USER },
                }
            - name: POSTGRES_PASSWORD
              valueFrom:
                {
                  secretKeyRef:
                    { name: nextcloud-secrets, key: POSTGRES_PASSWORD },
                }
            # Keep data in a subdirectory of the mount. postgres:18 changed defaults;
            # an explicit PGDATA subdir avoids "directory not empty"/lost+found init failures.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: db
              mountPath: /var/lib/postgresql/data
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "1Gi" }
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: nextcloud-db
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nextcloud
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
