apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-db
  namespace: nextcloud
  # Prune=false — never let ArgoCD auto-delete this data volume (ADR 014).
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: nextcloud
spec:
  replicas: 1
  strategy:
    # RWO PVC: two postgres pods would either deadlock on the volume or, worse,
    # both attach and corrupt the data dir. Recreate forces a hard swap.
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          # Must be >= the source AIO's Postgres major (18.4). Downgrading
          # a Postgres data dir is not a thing — it just won't start.
          image: postgres:18
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              # Root entrypoint chowns PGDATA then drops to the postgres user
              # via gosu — keep just those caps, drop the rest.
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETGID", "SETUID"]
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                { secretKeyRef: { name: nextcloud-secrets, key: POSTGRES_DB } }
            - name: POSTGRES_USER
              valueFrom:
                {
                  secretKeyRef: { name: nextcloud-secrets, key: POSTGRES_USER },
                }
            - name: POSTGRES_PASSWORD
              valueFrom:
                {
                  secretKeyRef:
                    { name: nextcloud-secrets, key: POSTGRES_PASSWORD },
                }
            # Postgres refuses to initdb into a non-empty directory, and the
            # Longhorn mount point comes with a `lost+found`. Putting PGDATA in
            # a subdirectory sidesteps that — initdb only sees its own empty dir.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: db
              mountPath: /var/lib/postgresql/data
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits: { memory: "1Gi" }
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: nextcloud-db
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nextcloud
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
