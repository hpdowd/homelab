apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          # Nextcloud uses redis for memcache + file locking. Both are throw-away
          # state — if redis restarts, Nextcloud rebuilds it. So persistence is
          # off (no RDB snapshots, no AOF), which also means no PVC needed.
          command: ["redis-server", "--save", "", "--appendonly", "no"]
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits: { memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: nextcloud
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
