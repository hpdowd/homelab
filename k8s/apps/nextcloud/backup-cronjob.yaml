# Daily Nextcloud backup to Backblaze B2 via restic. 03:00 local.
#
# Two things get backed up in the same run, both pushed to the same restic
# repo but with different tags so we can restore them independently:
#   - the data volume (mounted read-only from the running pod)
#   - a pg_dump of the postgres database
#
# This pod runs alongside the live Nextcloud pod — no downtime. The trick is
# podAffinity: Longhorn RWO volumes can only attach to one node at a time, so
# we co-locate the backup pod on the same node as Nextcloud and mount the PVC
# read-only there. Without the affinity it'd hit "Multi-Attach error" and
# never start.
#
# About the retry loop: the upload link here is a consumer line and occasionally
# drops mid-transfer (saw a lot of http2 stream resets during the first 37GB
# seed). restic uploads pack files and tracks what's already in the repo, so a
# failed run can be safely re-run — the next attempt only uploads what's missing.
# The loop wraps that: on failure, sleep a bit and try again, up to 8 times.
# It almost always succeeds on attempt 1 once the seed is done; the loop is
# insurance for the seed itself + the rare bad day.
#
# If the link is genuinely saturating and triggering the drops, uncomment
# --limit-upload <KiB/s> below.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-backup
  namespace: nextcloud
  labels:
    app: nextcloud-backup
spec:
  schedule: "0 3 * * *"
  timeZone: "Europe/Dublin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      # 8h ceiling. Drop this once the first full seed is done — incremental
      # runs finish in seconds.
      activeDeadlineSeconds: 28800
      template:
        spec:
          # Co-locate with the live Nextcloud pod so we can mount the RWO PVC
          # read-only on the same node. See header note.
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: nextcloud
                  topologyKey: kubernetes.io/hostname
          restartPolicy: OnFailure
          volumes:
            - name: nextcloud-data
              persistentVolumeClaim:
                claimName: nextcloud-data
                readOnly: true
            - name: db-dump
              emptyDir: {}
          containers:
            - name: backup
              # postgres:18-alpine gives us pg_dump matching the DB server.
              # restic isn't in this image — we apk add it at runtime, which
              # adds ~5s to startup and avoids maintaining a custom image.
              image: postgres:18-alpine
              command:
                - /bin/sh
                - -c
                - |
                  # Deliberately no `-e`: we want to handle retries ourselves,
                  # not bail on the first restic failure.
                  set -uo pipefail

                  echo "[backup] Installing restic..."
                  apk add --no-cache --quiet restic

                  echo "[backup] Dumping Nextcloud database..."
                  if ! PGPASSWORD="${DB_PASSWORD}" pg_dump \
                        -h postgres.nextcloud.svc.cluster.local \
                        -U nextcloud \
                        -d nextcloud_database \
                        --format=custom \
                        --file=/dump/nextcloud_db.dump; then
                    echo "[backup] FATAL: database dump failed"
                    exit 1
                  fi
                  echo "[backup] DB dump size: $(du -sh /dump/nextcloud_db.dump | cut -f1)"

                  # First-ever run: init the repo. Subsequent runs see it
                  # exists and skip. Cheaper than a separate bootstrap job.
                  echo "[backup] Init restic repo if needed..."
                  restic snapshots --quiet 2>/dev/null || restic init

                  # Retry loop for the big data backup.
                  # s3.connections=2 (default 5) — fewer parallel uploads = less
                  # likely to trip the consumer link's connection limits.
                  MAX=8
                  N=1
                  while [ "$N" -le "$MAX" ]; do
                    echo "[backup] Data backup attempt ${N}/${MAX}..."
                    # Excludes match the nextcloud:33-apache layout: the PVC
                    # root is /var/www/html, so the datadirectory is /data/data
                    # in here. (The original excludes used AIO-era paths like
                    # /data/nextcloud/* and /data/appdata_* that matched
                    # nothing — previews were silently included in every
                    # backup. Caught during the 2026-06-12 test restore.)
                    if restic backup /data \
                          --tag nextcloud-data \
                          -o s3.connections=2 \
                          --exclude="/data/data/appdata_*/preview" \
                          --exclude="/data/data/appdata_*/thumbnails" \
                          --exclude="/data/data/nextcloud.log" \
                          --exclude="/data/data/audit.log*"; then
                      echo "[backup] Data backup complete"
                      break
                    fi
                    echo "[backup] Attempt ${N} dropped — sleeping then retrying"
                    N=$((N + 1))
                    sleep 20
                  done
                  if [ "$N" -gt "$MAX" ]; then
                    echo "[backup] FATAL: data backup failed after ${MAX} attempts"
                    exit 1
                  fi

                  # DB dump is tiny — fewer retries needed.
                  echo "[backup] Backing up database dump..."
                  N=1
                  while [ "$N" -le 5 ]; do
                    if restic backup /dump --tag nextcloud-db -o s3.connections=2; then
                      break
                    fi
                    N=$((N + 1)); sleep 10
                  done

                  # Retention: 7 daily, 4 weekly, 3 monthly. --prune actually
                  # removes the unreferenced pack files from B2 (otherwise
                  # forget only updates the snapshot index, storage keeps growing).
                  echo "[backup] Pruning old snapshots..."
                  restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 3 \
                    --prune --tag nextcloud-data || true
                  restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 3 \
                    --prune --tag nextcloud-db || true

                  echo "[backup] Done. Current snapshots:"
                  restic snapshots
              env:
                - name: RESTIC_REPOSITORY
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: RESTIC_REPOSITORY
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: RESTIC_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: DB_PASSWORD
              volumeMounts:
                - name: nextcloud-data
                  mountPath: /data
                  readOnly: true
                - name: db-dump
                  mountPath: /dump
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
