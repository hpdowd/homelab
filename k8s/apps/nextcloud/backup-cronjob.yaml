# k8s/apps/nextcloud/backup-cronjob.yaml
#
# Backs up Nextcloud data PVC + Postgres database to Backblaze B2 via restic.
# Runs daily at 03:00 Europe/Dublin.
#
# RESILIENCE (hardened after http2 connection drops on consumer upload link):
#  - Internal retry loop: a dropped connection retries WITHIN the same pod.
#    restic resumes from the repo index each attempt, re-uploading only what's
#    missing — so retries make forward progress instead of restarting from zero.
#  - -o s3.connections=2 : fewer parallel connections = more stable on flaky links
#    (default is 5). Trades a little speed for reliability.
#  - activeDeadlineSeconds: generous ceiling so a slow initial 37GB seed isn't
#    killed mid-flight. Subsequent backups are incremental and finish in seconds;
#    you can lower this once the first full backup completes.
#  - podAffinity: co-locate the backup pod on the same node as the Nextcloud pod
#    so the RWO Longhorn volume can be mounted read-only without a Multi-Attach
#    error. No downtime (unlike Gitea, which scales down).
#
# Optional: uncomment --limit-upload below to throttle (KiB/s) if drops persist —
# saturating a consumer uplink can itself trigger connection resets.
#
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-backup
  namespace: nextcloud
  labels:
    app: nextcloud-backup
spec:
  schedule: "0 3 * * *"
  timeZone: "Europe/Dublin"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 28800 # 8h ceiling for the initial full seed
      template:
        spec:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: nextcloud
                  topologyKey: kubernetes.io/hostname
          restartPolicy: OnFailure
          volumes:
            - name: nextcloud-data
              persistentVolumeClaim:
                claimName: nextcloud-data
                readOnly: true
            - name: db-dump
              emptyDir: {}
          containers:
            - name: backup
              image: postgres:18-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -uo pipefail        # NOT -e: we handle backup retries ourselves

                  echo "[backup] Installing restic..."
                  apk add --no-cache --quiet restic

                  echo "[backup] Dumping Nextcloud database..."
                  if ! PGPASSWORD="${DB_PASSWORD}" pg_dump \
                        -h postgres.nextcloud.svc.cluster.local \
                        -U nextcloud \
                        -d nextcloud_database \
                        --format=custom \
                        --file=/dump/nextcloud_db.dump; then
                    echo "[backup] FATAL: database dump failed"
                    exit 1
                  fi
                  echo "[backup] DB dump size: $(du -sh /dump/nextcloud_db.dump | cut -f1)"

                  echo "[backup] Initialising restic repo (no-op if exists)..."
                  restic snapshots --quiet 2>/dev/null || restic init

                  # Retry loop: restic resumes across attempts (skips uploaded packs)
                  MAX=8
                  N=1
                  while [ "$N" -le "$MAX" ]; do
                    echo "[backup] Data backup attempt ${N}/${MAX}..."
                    if restic backup /data \
                          --tag nextcloud-data \
                          -o s3.connections=2 \
                          --exclude="/data/nextcloud/.opcache" \
                          --exclude="/data/nextcloud/cache" \
                          --exclude="/data/appdata_*/preview" \
                          --exclude="/data/appdata_*/thumbnails"; then
                      echo "[backup] Data backup complete"
                      break
                    fi
                    echo "[backup] Attempt ${N} dropped (likely transient) — resuming..."
                    N=$((N + 1))
                    sleep 20
                  done
                  if [ "$N" -gt "$MAX" ]; then
                    echo "[backup] FATAL: data backup failed after ${MAX} attempts"
                    exit 1
                  fi

                  echo "[backup] Backing up database dump..."
                  N=1
                  while [ "$N" -le 5 ]; do
                    if restic backup /dump --tag nextcloud-db -o s3.connections=2; then
                      break
                    fi
                    N=$((N + 1)); sleep 10
                  done

                  echo "[backup] Pruning old snapshots..."
                  restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 3 \
                    --prune --tag nextcloud-data || true
                  restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 3 \
                    --prune --tag nextcloud-db || true

                  echo "[backup] Done. Current snapshots:"
                  restic snapshots
              env:
                - name: RESTIC_REPOSITORY
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: RESTIC_REPOSITORY
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: RESTIC_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: DB_PASSWORD
              volumeMounts:
                - name: nextcloud-data
                  mountPath: /data
                  readOnly: true
                - name: db-dump
                  mountPath: /dump
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
