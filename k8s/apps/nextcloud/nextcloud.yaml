apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-data
  namespace: nextcloud
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 60Gi # source is 37G used; headroom for growth
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  replicas: 1
  strategy:
    type: Recreate # RWO PVC — single writer
  selector:
    matchLabels:
      app: nextcloud
  template:
    metadata:
      labels:
        app: nextcloud
    spec:
      containers:
        - name: nextcloud
          image: nextcloud:33-apache # matches source 33.0.3.2 (tag tracks latest 33.x patch)
          ports:
            - containerPort: 80
          env:
            # --- Database ---
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_DB
              valueFrom:
                { secretKeyRef: { name: nextcloud-secrets, key: POSTGRES_DB } }
            - name: POSTGRES_USER
              valueFrom:
                {
                  secretKeyRef: { name: nextcloud-secrets, key: POSTGRES_USER },
                }
            - name: POSTGRES_PASSWORD
              valueFrom:
                {
                  secretKeyRef:
                    { name: nextcloud-secrets, key: POSTGRES_PASSWORD },
                }
            # --- Redis ---
            - name: REDIS_HOST
              value: redis
            # --- Identity: MUST match imported DB or encrypted data/sessions break ---
            - name: NEXTCLOUD_PASSWORD_SALT
              valueFrom:
                {
                  secretKeyRef:
                    { name: nextcloud-secrets, key: NEXTCLOUD_PASSWORD_SALT },
                }
            - name: NEXTCLOUD_SECRET
              valueFrom:
                {
                  secretKeyRef:
                    { name: nextcloud-secrets, key: NEXTCLOUD_SECRET },
                }
            # --- Admin (only used on fresh install; importing, so ignored) ---
            - name: NEXTCLOUD_ADMIN_USER
              valueFrom:
                {
                  secretKeyRef:
                    { name: nextcloud-secrets, key: NEXTCLOUD_ADMIN_USER },
                }
            - name: NEXTCLOUD_ADMIN_PASSWORD
              valueFrom:
                {
                  secretKeyRef:
                    { name: nextcloud-secrets, key: NEXTCLOUD_ADMIN_PASSWORD },
                }
            # --- URLs / proxy ---
            - name: NEXTCLOUD_TRUSTED_DOMAINS
              value: "nextcloud.henrydowd.dev nextcloud.lan"
            - name: OVERWRITEPROTOCOL
              value: "https"
            - name: OVERWRITECLIURL
              value: "https://nextcloud.henrydowd.dev"
            # Traefik pod CIDR as trusted proxy so Nextcloud honours X-Forwarded-* .
            # Adjust if pod network differs (k3s default is 10.42.0.0/16).
            - name: TRUSTED_PROXIES
              value: "10.42.0.0/16"
          volumeMounts:
            - name: data
              mountPath: /var/www/html
          resources:
            requests: { memory: "512Mi", cpu: "250m" }
            limits: { memory: "1536Mi" }
          # Generous startup window — first boot runs occ upgrade/migrations.
          startupProbe:
            httpGet: { path: /status.php, port: 80 }
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /status.php, port: 80 }
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nextcloud-data
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  selector:
    app: nextcloud
  ports:
    - port: 80
      targetPort: 80
