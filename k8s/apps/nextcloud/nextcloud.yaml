apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-data
  namespace: nextcloud
  # Prune=false — never let ArgoCD auto-delete this data volume (ADR 014).
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 60Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  replicas: 1
  # Recreate, not RollingUpdate. The data PVC is RWO (ReadWriteOnce) so only one
  # pod can mount it at a time — a rolling update would deadlock waiting for the
  # old pod to release the volume.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nextcloud
  template:
    metadata:
      labels:
        app: nextcloud
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nextcloud
          # 33-apache tag tracks the latest 33.x patch. Source AIO was on 33.0.5.1,
          # so any 33.x is import-compatible. Do NOT jump to 34 here — Nextcloud
          # only supports one-major-at-a-time upgrades, and you'd skip the migration.
          image: nextcloud:33-apache
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              # apache binds :80 (NET_BIND_SERVICE) and drops its workers to
              # www-data (SETUID/SETGID); the entrypoint chowns the data dir
              # (CHOWN/DAC_OVERRIDE/FOWNER). Everything else is dropped.
              drop: ["ALL"]
              add:
                [
                  "CHOWN",
                  "DAC_OVERRIDE",
                  "FOWNER",
                  "SETGID",
                  "SETUID",
                  "NET_BIND_SERVICE",
                ]
          ports:
            - containerPort: 80
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_DB
              valueFrom:
                { secretKeyRef: { name: nextcloud-secrets, key: POSTGRES_DB } }
            - name: POSTGRES_USER
              valueFrom:
                {
                  secretKeyRef: { name: nextcloud-secrets, key: POSTGRES_USER },
                }
            - name: POSTGRES_PASSWORD
              valueFrom:
                {
                  secretKeyRef:
                    { name: nextcloud-secrets, key: POSTGRES_PASSWORD },
                }
            - name: REDIS_HOST
              value: redis
            # passwordsalt and secret from the old config.php. If these don't
            # match the values that encrypted the data in the imported DB,
            # every existing session breaks and encrypted fields go unreadable.
            # Pulled from the sealed secret so the original values stay in git.
            - name: NEXTCLOUD_PASSWORD_SALT
              valueFrom:
                {
                  secretKeyRef:
                    { name: nextcloud-secrets, key: NEXTCLOUD_PASSWORD_SALT },
                }
            - name: NEXTCLOUD_SECRET
              valueFrom:
                {
                  secretKeyRef:
                    { name: nextcloud-secrets, key: NEXTCLOUD_SECRET },
                }
            # Admin creds are only used on a fresh install. We import an existing
            # DB so these get ignored — kept so a clean redeploy still works.
            - name: NEXTCLOUD_ADMIN_USER
              valueFrom:
                {
                  secretKeyRef:
                    { name: nextcloud-secrets, key: NEXTCLOUD_ADMIN_USER },
                }
            - name: NEXTCLOUD_ADMIN_PASSWORD
              valueFrom:
                {
                  secretKeyRef:
                    { name: nextcloud-secrets, key: NEXTCLOUD_ADMIN_PASSWORD },
                }
            - name: NEXTCLOUD_TRUSTED_DOMAINS
              value: "nextcloud.henrydowd.dev nextcloud.lan"
            # Cloudflare terminates TLS, so the pod sees plain HTTP from cloudflared.
            # Without these two, Nextcloud generates http:// links and clients break.
            - name: OVERWRITEPROTOCOL
              value: "https"
            - name: OVERWRITECLIURL
              value: "https://nextcloud.henrydowd.dev"
            # Trust X-Forwarded-* from anything in the k3s pod CIDR (default 10.42/16).
            # That covers Traefik. Without this, Nextcloud sees the Traefik pod IP
            # as the client and rate-limits / mislogs everyone the same.
            - name: TRUSTED_PROXIES
              value: "10.42.0.0/16"
          volumeMounts:
            - name: data
              mountPath: /var/www/html
          resources:
            requests: { memory: "512Mi", cpu: "250m" }
            limits: { memory: "1536Mi" }
          # First boot runs `occ upgrade` and DB migrations against the imported
          # 37GB dataset — that can take several minutes. The startup probe gives
          # it up to 30 * 10s = 5min before k8s decides the pod is broken.
          startupProbe:
            httpGet: { path: /status.php, port: 80 }
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /status.php, port: 80 }
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nextcloud-data
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  selector:
    app: nextcloud
  ports:
    - port: 80
      targetPort: 80
