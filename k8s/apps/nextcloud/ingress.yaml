# Redirect the DAV .well-known paths so calendar/contacts sync clients work.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: nextcloud-wellknown
  namespace: nextcloud
spec:
  redirectRegex:
    regex: "https://(.*)/.well-known/(card|cal)dav"
    replacement: "https://${1}/remote.php/dav/"
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextcloud
  namespace: nextcloud
  annotations:
    # NOTE: do NOT pin router.entrypoints to websecure — the cloudflared tunnel
    # speaks plain HTTP to Traefik (TLS terminates at Cloudflare), so the router
    # must accept the 'web' entrypoint. Omitting the annotation serves both.
    traefik.ingress.kubernetes.io/router.middlewares: nextcloud-nextcloud-wellknown@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: nextcloud.henrydowd.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port: { number: 80 }
    - host: nextcloud.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port: { number: 80 }
