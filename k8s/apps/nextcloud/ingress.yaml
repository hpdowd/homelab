# CalDAV / CardDAV clients hit /.well-known/caldav (or carddav) to discover
# the real endpoint. Nextcloud serves both at /remote.php/dav/, so we rewrite
# the well-known path to the real one. Without this, iOS calendar sync silently
# does nothing.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: nextcloud-wellknown
  namespace: nextcloud
spec:
  redirectRegex:
    regex: "https://(.*)/.well-known/(card|cal)dav"
    replacement: "https://${1}/remote.php/dav/"
    permanent: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextcloud
  namespace: nextcloud
  annotations:
    # Don't add a router.entrypoints annotation here. Cloudflare terminates TLS
    # at the edge and cloudflared hits Traefik over plain HTTP on the `web`
    # entrypoint. A `websecure`-only router would silently 404 every public hit.
    # Lost half a day to this in phase 6b — don't redo it.
    traefik.ingress.kubernetes.io/router.middlewares: nextcloud-nextcloud-wellknown@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: nextcloud.henrydowd.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port: { number: 80 }
    - host: nextcloud.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextcloud
                port: { number: 80 }
