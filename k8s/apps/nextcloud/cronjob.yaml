# Nextcloud's background jobs (file scans, notifications, share cleanup, etc.)
# run via cron.php. The admin panel nags unless this fires every 5 minutes.
# Same image as the main pod so PHP version + app code line up exactly; runs
# as www-data against the same data volume.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-cron
  namespace: nextcloud
spec:
  schedule: "*/5 * * * *"
  # Forbid: if a run is slow, don't start another on top of it.
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # 280s — under the 5-minute schedule, so a stuck run gets killed before
      # the next one fires instead of stacking up.
      activeDeadlineSeconds: 280
      template:
        spec:
          restartPolicy: Never
          # The data PVC is RWO (ReadWriteOnce) and attaches to whichever node
          # the main nextcloud pod runs on. Without this affinity the scheduler
          # can land the cron pod on a different node, where the volume can't
          # attach (Multi-Attach error); the run then hangs until
          # activeDeadlineSeconds and fails. Co-locate with the main pod so the
          # cron pod always shares its node and its already-attached volume.
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: nextcloud
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: cron
              image: nextcloud:33-apache
              command:
                [
                  "su",
                  "-s",
                  "/bin/sh",
                  "www-data",
                  "-c",
                  "php -f /var/www/html/cron.php",
                ]
              volumeMounts:
                - name: data
                  mountPath: /var/www/html
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: nextcloud-data
