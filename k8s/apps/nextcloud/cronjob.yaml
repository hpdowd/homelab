apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-cron
  namespace: nextcloud
spec:
  schedule: "*/5 * * * *" # every 5 minutes, as Nextcloud expects for "Cron" mode
  concurrencyPolicy: Forbid # don't stack runs if one is slow
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 280 # kill a stuck run before the next fires
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: cron
              image: nextcloud:33-apache # same image as the app, so php + code match
              command:
                [
                  "su",
                  "-s",
                  "/bin/sh",
                  "www-data",
                  "-c",
                  "php -f /var/www/html/cron.php",
                ]
              volumeMounts:
                - name: data
                  mountPath: /var/www/html
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: nextcloud-data
